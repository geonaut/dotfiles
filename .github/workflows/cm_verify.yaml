name: "Verify Dotfiles"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-apply:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Mock Environment
        run: |
          # 1. Pre-fill answers to skip interactive prompts
          mkdir -p ~/.config/chezmoi
          chmod 700 ~/.config/chezmoi
          cat <<EOF > ~/.config/chezmoi/chezmoi.toml
          [data]
            name = "geonaut"
            install_languages = false
            is_server = false
            low_fidelity = false
            using_bazel = true
            using_k8s = true
            using_tf = true
          EOF

          # 2. Symlink source so chezmoi (and doctor) finds it automatically
          mkdir -p ~/.local/share
          ln -sf "$GITHUB_WORKSPACE" ~/.local/share/chezmoi

      - name: Initialize & Apply (Dry Run)
        # Now we run it exactly like a real user would
        run: chezmoi init --apply --dry-run --exclude externals

      - name: Run Chezmoi Doctor
        run: chezmoi doctor
