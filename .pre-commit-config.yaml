repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2 # Use the latest version
    hooks:
      - id: gitleaks
        # This tells it to run during the 'push' phase
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace    # Cleans up messy line endings
      - id: end-of-file-fixer      # Ensures files end with a newline
      - id: check-yaml             # Validates your GHA and Chezmoi YAMLs
      - id: check-added-large-files # Prevents pushing huge binaries accidentally

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.9.0
    hooks:
      - id: shellcheck
