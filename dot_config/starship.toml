"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua)\
$line_break$character"""

right_format = """
${custom.worktree}\
$time\
[](color_bg1)
"""

# ... (Keep your palette and module settings below)
palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Ubuntu = " "
Macos = "󰀵 "
Linux = "󰌽 "

[username]
show_always = false
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'

[line_break]
disabled = true

[custom.worktree]
description = "Show truncated worktree name with icon"
# Logic: Get name, check length. If > 8, take first 8 and add '...'. Else, print name.
command = '''
name=$(basename $(git rev-parse --show-toplevel 2>/dev/null))
if [ ${#name} -gt 8 ]; then
    echo "${name:0:8}.."
else
    echo "$name"
fi
'''
when = 'git rev-parse --git-dir 2>/dev/null | grep -q "worktrees"'
style = "bold purple"
format = "[󰊢  󰐆 $output]($style)"
shell = ["bash", "--noprofile", "--norc"]
